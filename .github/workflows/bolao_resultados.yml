name: Bolão da Família - Mensagem Resultados

on:
  schedule:
    - cron: '0 9-14 * * *'
  workflow_dispatch: 

jobs:
  mandar-resultados:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Mandar mensagem Resultados
        env:
          EVOLUTION_URL: ${{ secrets.EVOLUTION_URL }}
          EVOLUTION_APIKEY: ${{ secrets.EVOLUTION_APIKEY }}
          EVOLUTION_PHONE_ANUNCIOS: ${{ secrets.EVOLUTION_PHONE_ANUNCIOS }}
          EVOLUTION_PHONE_RESULTADOS: ${{ secrets.EVOLUTION_PHONE_RESULTADOS }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID:           ${{ secrets.SHEET_ID }}
        run: python send_resultados.py